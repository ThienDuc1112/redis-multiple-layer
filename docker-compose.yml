version: '3.8'

services:
  redis:
    image: redis:7.0-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - cache-network
    restart: unless-stopped

volumes:
  redis-data:

networks:
  cache-network:
    driver: bridge